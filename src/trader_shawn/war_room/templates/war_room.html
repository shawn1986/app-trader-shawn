<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>War Room</title>
    <link rel="stylesheet" href="/static/war_room.css">
</head>
<body data-mode="monitoring">
    <main class="war-room">
        <section class="panel command-status">
            <h2>Command Status</h2>
            <p>Core systems online. Monitoring live operations.</p>
        </section>
        <section class="panel risk-deck">
            <h2>Risk Deck</h2>
            <p>Portfolio exposure and guardrail metrics will populate here.</p>
        </section>
        <section class="panel hot-positions">
            <h2>Hot Positions</h2>
            <p>Highest-priority positions and anomalies appear in this panel.</p>
        </section>
        <section class="panel threat-rail">
            <h2>Threat Rail</h2>
            <p>Type ARM to unlock</p>
        </section>
    </main>
    <script src="/static/war_room.js" defer></script>
</body>
</html>
